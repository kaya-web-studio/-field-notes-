<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Note System - 荷蘭 — Kaya 2026</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --bg2: #f5f4f0;
  --bg3: #efede8;
  --text: #1a1a18;
  --text2: #5f5e5a;
  --text3: #888780;
  --border: rgba(0,0,0,0.12);
  --border2: rgba(0,0,0,0.22);
  --radius: 8px;
  --radius-lg: 12px;
  --success-bg: #eaf3de;
  --success-text: #27500a;
  --success-border: rgba(59,109,17,0.25);
  --danger-bg: #fcebeb;
  --danger-text: #791f1f;
  --danger-border: rgba(226,75,74,0.25);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a;
    --bg2: #252523;
    --bg3: #2e2e2b;
    --text: #e8e6e0;
    --text2: #a8a69f;
    --text3: #6e6d68;
    --border: rgba(255,255,255,0.1);
    --border2: rgba(255,255,255,0.2);
    --success-bg: #173404;
    --success-text: #c0dd97;
    --success-border: rgba(99,153,34,0.3);
    --danger-bg: #501313;
    --danger-text: #f09595;
    --danger-border: rgba(226,75,74,0.3);
  }
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg3);
  color: var(--text);
  min-height: 100vh;
  padding: 0;
}

.page {
  max-width: 640px;
  margin: 0 auto;
  padding: 1.5rem 1rem 3rem;
}

.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.25rem;
}

.sys-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text3);
}

.counter {
  font-size: 12px;
  color: var(--text3);
  background: var(--bg2);
  padding: 3px 8px;
  border-radius: var(--radius);
  border: 0.5px solid var(--border);
}

.card {
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1rem 1.25rem;
  margin-bottom: 12px;
}

.card-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.field-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: background .2s;
}

.field-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}

.row2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

@media (max-width: 400px) {
  .row2 { grid-template-columns: 1fr; }
}

select, input[type=text], textarea {
  width: 100%;
  font-size: 13px;
  color: var(--text);
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 9px 10px;
  font-family: inherit;
  appearance: none;
  -webkit-appearance: none;
  transition: border-color .15s;
}

select:focus, input:focus, textarea:focus {
  outline: none;
  border-color: var(--border2);
}

textarea {
  resize: vertical;
  min-height: 60px;
  line-height: 1.5;
}

.oimti-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.oimti-row {
  display: grid;
  grid-template-columns: 88px 1fr;
  gap: 10px;
  align-items: start;
}

@media (max-width: 400px) {
  .oimti-row { grid-template-columns: 1fr; gap: 4px; }
}

.oimti-key {
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  padding-top: 10px;
  line-height: 1.3;
}

.oimti-key span {
  display: block;
  font-size: 11px;
  font-weight: 400;
  color: var(--text3);
  margin-top: 2px;
}

.btn-row {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  align-items: center;
  margin-top: 14px;
}

.toast {
  font-size: 12px;
  color: var(--success-text);
  background: var(--success-bg);
  border: 0.5px solid var(--success-border);
  border-radius: var(--radius);
  padding: 6px 12px;
  display: none;
  margin-right: auto;
}

.toast.show { display: inline-block; }

.error-msg {
  font-size: 12px;
  color: var(--danger-text);
  background: var(--danger-bg);
  border: 0.5px solid var(--danger-border);
  border-radius: var(--radius);
  padding: 6px 12px;
  display: none;
  margin-right: auto;
}

.error-msg.show { display: inline-block; }

button {
  font-size: 13px;
  padding: 8px 16px;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: inherit;
  border: 0.5px solid var(--border2);
  background: transparent;
  color: var(--text);
  transition: background .15s, opacity .15s, transform .1s;
  white-space: nowrap;
}

button:hover { background: var(--bg2); }
button:active { transform: scale(.98); }

.btn-submit {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}

.btn-submit:hover { opacity: .85; background: var(--text); }

.btn-export {
  font-size: 12px;
  padding: 6px 12px;
}

.log-wrap { margin-top: 20px; }

.log-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.log-head-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text3);
  font-weight: 600;
}

.log-item {
  display: grid;
  grid-template-columns: 6px 56px 1fr 44px;
  gap: 8px;
  align-items: center;
  padding: 9px 0;
  border-bottom: 0.5px solid var(--border);
  font-size: 12px;
}

.log-item:last-child { border-bottom: none; }

.log-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.log-venue {
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.log-obs {
  color: var(--text2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.log-time {
  color: var(--text3);
  white-space: nowrap;
  text-align: right;
}

.empty-state {
  font-size: 13px;
  color: var(--text3);
  text-align: center;
  padding: 2rem 0;
}

.divider {
  height: 0.5px;
  background: var(--border);
  margin: 1.5rem 0;
}

.footer {
  font-size: 11px;
  color: var(--text3);
  text-align: center;
  margin-top: 2rem;
}
</style>
</head>
<body>
<div class="page">

<div class="top-bar">
  <span class="sys-label">Field Note System</span>
  <span class="counter" id="cnt">0 筆紀錄</span>
</div>

<div class="card">
  <div class="card-head">
    <div class="field-dot" id="venue-dot" style="background:#888780"></div>
    <span class="field-label">場域 / 日期</span>
  </div>

  <div class="row2">
    <select id="venue" onchange="updateDot()">
      <option value="">選擇場域</option>
      <optgroup label="抵達與適應">
        <option value="city">Eindhoven 城市觀察</option>
        <option value="arnhem">Arnhem 露天博物館</option>
        <option value="giethoorn">Giethoorn 羊角村</option>
      </optgroup>
      <optgroup label="HTI 課程">
        <option value="hti1">HTI Day 1 — 系統架構導論</option>
        <option value="hti2">HTI Day 2 — 需求工程</option>
        <option value="hti3">HTI Day 3 — 功能架構</option>
        <option value="hti4">HTI Day 4 — 整合策略</option>
        <option value="hti5">HTI Day 5 — 架構簡報</option>
      </optgroup>
      <optgroup label="DDW 設計週">
        <option value="ddw1">DDW — Strijp-S 主展區</option>
        <option value="ddw2">DDW — Design Academy</option>
      </optgroup>
      <optgroup label="機構見習">
        <option value="brainport">Brainport + HTC</option>
        <option value="tno">TNO Delft</option>
        <option value="bluecity">BlueCity Rotterdam</option>
        <option value="startup">Startup Amsterdam + ACE</option>
        <option value="wur">WUR + Zaanse Schans</option>
      </optgroup>
      <option value="other">其他</option>
    </select>
    <input type="text" id="datefield" placeholder="日期（如 10/24）" maxlength="8">
  </div>

  <div class="oimti-grid">
    <div class="oimti-row">
      <div class="oimti-key">Observation<span>看到什麼</span></div>
      <textarea id="obs" placeholder="現場觀察到的具體現象、設計、互動方式…" rows="2"></textarea>
    </div>
    <div class="oimti-row">
      <div class="oimti-key">Insight<span>代表什麼</span></div>
      <textarea id="ins" placeholder="這件事背後的邏輯或設計意圖…" rows="2"></textarea>
    </div>
    <div class="oimti-row">
      <div class="oimti-key">Mapping<span>連結什麼</span></div>
      <textarea id="map" placeholder="與正在解決的問題有什麼關聯、與台灣生態的關聯、哪個情境會需要這個…" rows="2"></textarea>
    </div>
    <div class="oimti-row">
      <div class="oimti-key">Transfer<span>可以做什麼</span></div>
      <textarea id="trf" placeholder="可以轉化成工具、內容或方法的方向…" rows="2"></textarea>
    </div>
    <div class="oimti-row">
      <div class="oimti-key">Idea<span>下一步</span></div>
      <textarea id="idea" placeholder="快速想法或待確認的問題…" rows="2"></textarea>
    </div>
  </div>

  <div class="btn-row">
    <span class="error-msg" id="err">請選擇場域並填寫 Observation</span>
    <span class="toast" id="toast">已下載</span>
    <button onclick="clearForm()">清除</button>
    <button class="btn-submit" onclick="submitNote()">送出並下載</button>
  </div>
</div>

<div class="log-wrap">
  <div class="log-head">
    <span class="log-head-label">本次紀錄</span>
    <button class="btn-export" onclick="exportAll()" id="export-btn" style="display:none">匯出全部 .txt</button>
  </div>
  <div id="log-list"><div class="empty-state">還沒有紀錄</div></div>
</div>

<div class="footer">Field Note System_荷蘭 · Kaya 2026 · 即時觀察筆記</div>

</div>

<script>
const VENUE_COLORS = {
  city:'#888780', arnhem:'#888780', giethoorn:'#888780',
  hti1:'#185FA5', hti2:'#185FA5', hti3:'#185FA5', hti4:'#185FA5', hti5:'#185FA5',
  ddw1:'#993556', ddw2:'#993556',
  brainport:'#3B6D11', tno:'#3B6D11', bluecity:'#3B6D11', startup:'#3B6D11', wur:'#3B6D11',
  other:'#888780'
};

const notes = [];

function updateDot() {
  const v = document.getElementById('venue').value;
  document.getElementById('venue-dot').style.background = VENUE_COLORS[v] || '#888780';
}

function getVenueLabel(v) {
  const el = document.getElementById('venue');
  const opt = [...el.options].find(o => o.value === v);
  return opt ? opt.text : v;
}

function submitNote() {
  const venue = document.getElementById('venue').value;
  const date = document.getElementById('datefield').value.trim();
  const obs = document.getElementById('obs').value.trim();
  const ins = document.getElementById('ins').value.trim();
  const map = document.getElementById('map').value.trim();
  const trf = document.getElementById('trf').value.trim();
  const idea = document.getElementById('idea').value.trim();

  const err = document.getElementById('err');

  if (!venue || !obs) {
    err.classList.add('show');
    setTimeout(() => err.classList.remove('show'), 2500);
    return;
  }

  const note = {
    id: Date.now(),
    venue, venueLabel: getVenueLabel(venue),
    date: date || '—',
    obs, ins, map, trf, idea,
    time: new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' })
  };

  notes.push(note);
  downloadCard(note);
  updateLog();

  document.getElementById('cnt').textContent = notes.length + ' 筆紀錄';
  document.getElementById('export-btn').style.display = notes.length > 1 ? 'inline-block' : 'none';

  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);

  clearForm(true);
}

function buildNoteText(n) {
  const rows = [
    ['場域', n.venueLabel],
    ['日期', n.date],
    ['Observation', n.obs],
    ['Insight', n.ins],
    ['Mapping', n.map],
    ['Transfer', n.trf],
    ['Idea', n.idea],
  ].map(([k, v]) => v ? k + ':\n' + v : '').filter(Boolean).join('\n\n');
  return 'Field Note — ' + n.venueLabel + '\n' + '='.repeat(40) + '\n\n' + rows + '\n\n---\n記錄時間 ' + n.time;
}

function downloadCard(n) {
  const blob = new Blob([buildNoteText(n)], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'note_' + n.venue + '_' + (n.date.replace('/', '')) + '.txt';
  a.click();
  URL.revokeObjectURL(url);
}

function exportAll() {
  if (!notes.length) return;
  const all = notes.map((n, i) => (i > 0 ? '\n\n' + '='.repeat(60) + '\n\n' : '') + buildNoteText(n)).join('');
  const blob = new Blob([all], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'field_notes_all_' + new Date().toISOString().slice(0,10) + '.txt';
  a.click();
  URL.revokeObjectURL(url);
}

function clearForm(keepVenue) {
  if (!keepVenue) document.getElementById('venue').value = '';
  document.getElementById('datefield').value = '';
  ['obs', 'ins', 'map', 'trf', 'idea'].forEach(id => document.getElementById(id).value = '');
  updateDot();
}

function updateLog() {
  const el = document.getElementById('log-list');
  if (!notes.length) {
    el.innerHTML = '<div class="empty-state">還沒有紀錄</div>';
    return;
  }
  el.innerHTML = [...notes].reverse().map(n => `
    <div class="log-item">
      <div class="log-dot" style="background:${VENUE_COLORS[n.venue] || '#888'}"></div>
      <div class="log-venue">${n.date}</div>
      <div class="log-obs">${n.venueLabel} — ${n.obs.slice(0, 45)}${n.obs.length > 45 ? '…' : ''}</div>
      <div class="log-time">${n.time}</div>
    </div>`).join('');
}
</script>
</body>
</html>
